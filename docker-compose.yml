version: "3.9"

# ── Local development stack ───────────────────────────────────────────────────
# Start everything:  docker compose up -d
# View logs:         docker compose logs -f api worker
# Stop:              docker compose down

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-claudbot}
      POSTGRES_USER:     ${POSTGRES_USER:-claudbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-claudbot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── FastAPI ───────────────────────────────────────────────────────────────────
  api:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Celery worker ─────────────────────────────────────────────────────────────
  worker:
    build: .
    restart: unless-stopped
    env_file: .env
    command: >
      celery -A app.worker.celery_app worker
        --loglevel=info
        --concurrency=${CELERY_CONCURRENCY:-4}
        --queues=celery
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Flower (monitoring UI) ─────────────────────────────────────────────
  flower:
    build: .
    restart: unless-stopped
    env_file: .env
    command: >
      celery -A app.worker.celery_app flower
        --port=5555
        --basic_auth=admin:adminpassword
    ports:
      - "5555:5555"
    depends_on:
      - redis

volumes:
  postgres_data:
